services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: proposal_checker
      POSTGRES_USER: proposal_checker
      POSTGRES_PASSWORD: proposal_checker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proposal_checker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  proposal-checker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env.local
    environment:
      DATABASE_URL: postgres://proposal_checker:proposal_checker@postgres:5432/proposal_checker
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
